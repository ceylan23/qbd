name: Wallet Monitor

on:
  schedule:
    # 每 30 分钟执行一次 (由于 GitHub Actions 资源限制，实际可能会有几分钟延迟)
    - cron: '*/3 * * * *'
  workflow_dispatch: # 允许你手动点击运行

jobs:
  check-wallets:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      
    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        pip install -r requirements.txt
        
    - name: 运行监控脚本
      env:
        # 这里从 GitHub Secrets 中读取你的密钥
        WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN }}
        ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      run: python monitor_wallets.py
